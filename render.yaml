services:
  - type: web
    name: vriends-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./db/vriends.db
      - key: FRONTEND_URL
        fromService:
          name: vriends-frontend
          type: web
          property: host

  - type: web
    name: vriends-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: vriends-backend
          type: web
          property: host
